name: matching-service CI Pipeline

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  pipeline:
    uses: ./.github/workflows/ci_service_pipeline.yml
    with:
      service_name: matching-service
      service_path: .
      sonar_project_key: medicojob-matching-service
      sonar_token_secret_name: SONAR_TOKEN
    secrets: inherit